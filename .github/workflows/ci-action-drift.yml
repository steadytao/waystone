name: CI / Action Drift

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-action-drift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  action-drift:
    name: Action Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          check-latest: false

      - name: Check Action Pins and Drift
        run: python3 ./.github/scripts/ci/check_action_pins.py
