name: CodeQL

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/scripts/**"
      - ".github/workflows/**"
      - "**/*.go"
      - "**/*.py"
      - "go.mod"
      - "go.sum"
  push:
    branches:
      - main
    paths:
      - ".github/scripts/**"
      - ".github/workflows/**"
      - "**/*.go"
      - "**/*.py"
      - "go.mod"
      - "go.sum"
  schedule:
    - cron: "13 18 * * 5"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_go_mod: ${{ steps.detect.outputs.has_go_mod }}
      has_go_files: ${{ steps.detect.outputs.has_go_files }}
      has_python_files: ${{ steps.detect.outputs.has_python_files }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Detect analysable source
        id: detect
        run: |
          set -euo pipefail

          has_go_mod=false
          has_go_files=false
          has_python_files=false

          if [ -f go.mod ]; then
            has_go_mod=true
          fi

          if find . -type f -name '*.go' -not -path './vendor/*' | grep -q .; then
            has_go_files=true
          fi

          if find . -type f -name '*.py' | grep -q .; then
            has_python_files=true
          fi

          {
            echo "has_go_mod=${has_go_mod}"
            echo "has_go_files=${has_go_files}"
            echo "has_python_files=${has_python_files}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "# CodeQL"
            echo "- Actions analysis: enabled"
            if [ "${has_python_files}" = "true" ]; then
              echo "- Python analysis: enabled"
            else
              echo "- Python analysis: skipped"
            fi
            if [ "${has_go_mod}" = "true" ] && [ "${has_go_files}" = "true" ]; then
              echo "- Go analysis: enabled"
            else
              echo "- Go analysis: skipped"
            fi
            echo
            echo "## Notes"
            if [ "${has_python_files}" = "false" ]; then
              echo "- No Python source files were found."
            fi
            if [ "${has_go_mod}" = "false" ]; then
              echo "- No \`go.mod\` file was found at the repository root, so Go analysis cannot build deterministically yet."
            elif [ "${has_go_files}" = "false" ]; then
              echo "- A Go module exists, but no Go source files were found."
            else
              echo "- Go analysis uses a manual \`go build ./...\` step instead of autobuild to keep the build surface explicit."
              echo "- Go test extraction is enabled, so \`*_test.go\` files will be included in CodeQL analysis."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - preflight
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: actions
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:actions"

  analyze-python:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - preflight
    if: ${{ needs.preflight.outputs.has_python_files == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:python"

  analyze-go:
    name: Analyze (go)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
    if: ${{ needs.preflight.outputs.has_go_mod == 'true' && needs.preflight.outputs.has_go_files == 'true' }}
    env:
      CODEQL_EXTRACTOR_GO_OPTION_EXTRACT_TESTS: "true"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: go
          build-mode: manual
          queries: security-and-quality
          dependency-caching: true

      - name: Build Go packages for extraction
        run: |
          set -euo pipefail
          go build ./...

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:go"
