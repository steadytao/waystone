name: CI / Static Analysis

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-static-analysis-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  STATICCHECK_VERSION: 2025.1.1
  GOSEC_VERSION: v2.22.11

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      has_go_mod: ${{ steps.detect.outputs.has_go_mod }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Detect Go Module
        id: detect
        run: |
          set -euo pipefail

          if [ -f go.mod ]; then
            echo "has_go_mod=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "# CI / Static Analysis"
            echo "- Result: skipped"
            echo
            echo "## Why this was skipped"
            echo "- No \`go.mod\` file was found at the repository root."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "has_go_mod=false" >> "${GITHUB_OUTPUT}"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
    if: ${{ needs.preflight.outputs.has_go_mod == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            github-registry-files.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Install Static Analysis Tools
        run: |
          set -euo pipefail
          go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"
          go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"

      - name: Run staticcheck
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Run gosec
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/gosec" ./...
