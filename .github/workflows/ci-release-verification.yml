name: CI / Release Verification

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-release-verification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GORELEASER_VERSION: v2.15.3
  SYFT_VERSION: v1.42.4

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      has_release_inputs: ${{ steps.detect.outputs.has_release_inputs }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Detect Release Inputs
        id: detect
        run: |
          set -euo pipefail

          if [ ! -f go.mod ]; then
            {
              echo "# CI / Release Verification"
              echo "- Result: skipped"
              echo
              echo "## Why this was skipped"
              echo "- No \`go.mod\` file was found at the repository root."
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "has_release_inputs=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          for config in .goreleaser.yml .goreleaser.yaml goreleaser.yml goreleaser.yaml; do
            if [ -f "${config}" ]; then
              echo "has_release_inputs=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          done

          {
            echo "# CI / Release Verification"
            echo "- Result: skipped"
            echo
            echo "## Why this was skipped"
            echo "- No Goreleaser configuration file was found."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "has_release_inputs=false" >> "${GITHUB_OUTPUT}"

  release-verification:
    name: Release Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - preflight
    if: ${{ needs.preflight.outputs.has_release_inputs == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            github-registry-files.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      - name: Add Syft to PATH
        run: |
          set -euo pipefail
          dirname "${{ steps.syft.outputs.cmd }}" >> "${GITHUB_PATH}"

      - name: Install Goreleaser
        run: |
          set -euo pipefail
          go install "github.com/goreleaser/goreleaser/v2@${GORELEASER_VERSION}"

      - name: Validate Goreleaser Config
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/goreleaser" check

      - name: Verify CONTRIBUTORS ledger
        run: |
          set -euo pipefail
          python3 .github/scripts/release/generate_contributors.py --check

      - name: Build Snapshot Release Surface
        env:
          RELEASE_NAME: Waystone snapshot
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/goreleaser" release --snapshot --clean --skip=sign

      - name: Verify generated release integrity assets
        run: |
          set -euo pipefail

          if [ ! -f dist/checksums.txt ]; then
            echo "Missing dist/checksums.txt"
            exit 1
          fi

          mapfile -t sboms < <(find dist -maxdepth 1 -type f -name '*.spdx.json' | sort)
          if [ "${#sboms[@]}" -eq 0 ]; then
            echo "No archive SBOMs were generated"
            exit 1
          fi
