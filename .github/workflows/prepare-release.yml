name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag, for example v0.1.0"
        required: true
        type: string
      commit_hash:
        description: "Commit hash to release from"
        required: true
        type: string

concurrency:
  group: prepare-release-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  GOTOOLCHAIN: local
  STATICCHECK_VERSION: 2025.1.1
  GOSEC_VERSION: v2.22.11
  GOVULNCHECK_VERSION: v1.2.0

jobs:
  prepare:
    name: Verify and Tag Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            github-registry-files.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Check release token availability
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "Error: RELEASE_TOKEN is not available to this workflow"
            echo "Configure it as a repository, organisation or environment secret that this job can access"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Print Go version
        run: go version

      - name: Install Release Analysis Tools
        run: |
          set -euo pipefail
          go install "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}"
          go install "github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}"
          go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

      - name: Trim and validate inputs
        id: inputs
        run: |
          VERSION="$(echo "${{ inputs.version }}" | xargs)"
          COMMIT_HASH="$(echo "${{ inputs.commit_hash }}" | xargs)"
          RELEASE_NOTES_FILE="docs/releases/${VERSION}.md"

          {
            echo "version=$VERSION"
            echo "commit_hash=$COMMIT_HASH"
            echo "release_notes_file=$RELEASE_NOTES_FILE"
          } >> "$GITHUB_OUTPUT"

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "Error: version must follow semver form such as v0.1.0 or v0.1.0-rc.1"
            exit 1
          fi

          if [[ ! "$COMMIT_HASH" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "Error: commit_hash must be a valid SHA"
            exit 1
          fi

          if ! git cat-file -e "$COMMIT_HASH^{commit}" 2>/dev/null; then
            echo "Error: commit $COMMIT_HASH does not exist"
            exit 1
          fi

      - name: Check release tag does not already exist
        run: |
          VERSION="${{ steps.inputs.outputs.version }}"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Error: tag $VERSION already exists locally"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Error: tag $VERSION already exists on origin"
            exit 1
          fi

      - name: Check out target commit
        run: git checkout "${{ steps.inputs.outputs.commit_hash }}"

      - name: Configure git identity for release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check checked-in release notes file exists
        run: |
          RELEASE_NOTES_FILE="${{ steps.inputs.outputs.release_notes_file }}"

          if [ ! -f "$RELEASE_NOTES_FILE" ]; then
            echo "Error: checked-in release notes file '$RELEASE_NOTES_FILE' does not exist"
            exit 1
          fi

      - name: Verify CONTRIBUTORS ledger
        run: |
          set -euo pipefail
          python3 .github/scripts/release/generate_contributors.py --check

      - name: Check gofmt
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          if [ "${#go_files[@]}" -eq 0 ]; then
            echo "No Go files found for gofmt verification"
            exit 1
          fi

          unformatted="$(gofmt -l "${go_files[@]}")"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check module tidiness
        run: go mod tidy -diff

      - name: Verify module definitions
        run: go mod verify

      - name: Resolve CLI binary path
        run: |
          # shellcheck disable=SC2153
          runner_temp="$RUNNER_TEMP"
          if command -v cygpath >/dev/null 2>&1; then
            runner_temp="$(cygpath -u "$RUNNER_TEMP")"
          fi

          binary_name="waystone"
          if [ "$RUNNER_OS" = "Windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          printf 'WAYSTONE_BINARY=%s\n' "$runner_temp/$binary_name" >> "$GITHUB_ENV"

      - name: Build CLI
        run: go build -o "$WAYSTONE_BINARY" ./cmd/waystone

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: Run gosec
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/gosec" ./...

      - name: Run govulncheck
        run: |
          set -euo pipefail
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Run test suite
        run: go test -count=1 ./...

      - name: Run deterministic CLI smoke checks
        run: |
          set -euo pipefail

          assert_contains() {
            local text="$1"
            local needle="$2"
            local label="$3"
            if ! grep -Fq -- "$needle" <<<"$text"; then
              echo "$label did not contain expected text: $needle"
              exit 1
            fi
          }

          output="$("$WAYSTONE_BINARY" --help)"
          assert_contains "$output" "waystone github auth login" "CLI help output"
          assert_contains "$output" "waystone ledger verify [--ledger <dir>] [--strict] [--signatures]" "CLI help output"

          smoke_ledger="$(mktemp -d)"
          trap 'rm -rf "$smoke_ledger"' EXIT
          output="$("$WAYSTONE_BINARY" ledger verify --ledger "$smoke_ledger" --strict)"
          assert_contains "$output" "Operations" "Ledger verify output"

          output="$("$WAYSTONE_BINARY" version)"
          assert_contains "$output" "0.2.0" "Version output"

          output="$("$WAYSTONE_BINARY" version --json)"
          assert_contains "$output" '"version": "0.2.0"' "Version JSON output"

      - name: Check diff formatting
        run: git diff --check

      - name: Ensure working tree is unchanged
        run: |
          status="$(git status --porcelain=v1)"
          if [ -n "$status" ]; then
            echo "working tree changed during verification"
            echo "$status"
            exit 1
          fi

      - name: Create annotated release tag
        run: |
          VERSION="${{ steps.inputs.outputs.version }}"
          git tag -a "$VERSION" -m "Release $VERSION"

      - name: Push release tag
        run: git push origin "${{ steps.inputs.outputs.version }}"
