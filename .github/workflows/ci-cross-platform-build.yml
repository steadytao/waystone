name: CI / Cross-Platform Build

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-cross-platform-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      has_go_mod: ${{ steps.detect.outputs.has_go_mod }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Detect Go Module
        id: detect
        run: |
          set -euo pipefail

          if [ -f go.mod ]; then
            echo "has_go_mod=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "# CI / Cross-Platform Build"
            echo "- Result: skipped"
            echo
            echo "## Why this was skipped"
            echo "- No \`go.mod\` file was found at the repository root."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "has_go_mod=false" >> "${GITHUB_OUTPUT}"

  build:
    name: Build (${{ matrix.os }})
    needs:
      - preflight
    if: ${{ needs.preflight.outputs.has_go_mod == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Harden Runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: |
            168.63.129.16:53
            api.github.com:443
            codeload.github.com:443
            github.com:443
            *.actions.githubusercontent.com:443
            results-receiver.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            github-registry-files.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Build Packages
        run: |
          set -euo pipefail
          go build ./...
